experiment:
  name: "anime_clora_tagged"
  seed: 42
  output_dir: "../outputs/faithful/tagged"
  method: "faithful_c_lora"

model:
  pretrained_model_name: "hakurei/waifu-diffusion"
  lora_rank: 16
  lora_alpha: 16
  lora_target_modules: ["to_k", "to_v"]
  enable_xformers_memory_efficient_attention: false
  mixed_precision: "bf16"

training:
  learning_rate: 2.0e-4
  max_train_steps: 1500
  train_batch_size: 1
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  use_8bit_adam: false
  seed: 42

tasks:
  - name: "Venti"
    trigger_token: "venti_lumy"
    eval_prompt: "a portrait of <venti_lumy>"
    class_prompt: "a photo of anime character"
    data_dir: "../dataset/venti/train"
    ref_dir: "../dataset/venti/ref"

  - name: "Miku"
    trigger_token: "miku_lumy"
    eval_prompt: "a portrait of <miku_lumy>"
    class_prompt: "a photo of anime character"
    data_dir: "../dataset/miku/train"
    ref_dir: "../dataset/miku/ref"

evaluation:
  num_images_per_prompt: 4
  guidance_scale: 7.5
  num_inference_steps: 30
  image_size: 512
  compute_confusion_gap: true
  per_prompt_breakdown: false
  prompts_per_character:
    - "{instance_prompt}, portrait, white background"
    - "{instance_prompt}, upper body, smiling"
    - "{instance_prompt}, full body, standing"
    - "{instance_prompt}, close-up face, detailed"
    - "{instance_prompt}, looking to the side, soft lighting"
    - "{instance_prompt}, chibi style, cute expression"

c_lora:
  token_init: "random"
  train_token_embeddings: true

  prompt_mode: "clora"
  use_image_captions: true
  caption_extensions: [".txt", ".caption", ".tags"]
  caption_prefix_template: "a portrait of <{trigger_token}>"
  caption_suffix_template: "anime, masterpiece, best quality"
  strip_trigger_from_tags: true
  strip_task_name_from_tags: true
  lowercase_tags: true
  shuffle_tags: false
  max_caption_tags: 48

  adapter_strategy: "per_task"
  regularizer_type: "occupancy"
  regularization_weight: 0.1

  prior_preservation: false
  prior_loss_weight: 1.0
  num_class_images: 400
  class_prompt: "a photo of anime character"

  inference_adapter_mode: "merged_online"
  run_diagnostic_eval: false
  run_multi_concept_probe: true